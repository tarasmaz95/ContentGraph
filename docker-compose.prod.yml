# Production overrides — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  postgres:
    ports: !reset [] # DB only inside Docker network (no public 5433)

  backend:
    ports: !override
      - "127.0.0.1:8001:8000"
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-https://tm1.website,https://www.tm1.website,http://tm1.website,http://www.tm1.website}

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://tm1.website/api/v1}
    ports: !override
      - "127.0.0.1:3000:3000"
