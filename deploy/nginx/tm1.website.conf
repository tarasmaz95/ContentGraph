# ContentGraph — tm1.website (managed by deploy/setup-nginx-ssl.sh or certbot)

upstream contentgraph_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream contentgraph_backend {
    server 127.0.0.1:8001;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name tm1.website www.tm1.website;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/v1/ {
        proxy_pass http://contentgraph_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /docs {
        proxy_pass http://contentgraph_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://contentgraph_backend;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://contentgraph_backend;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://contentgraph_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
